<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Resgate Estelar - BD Interativa</title>
    <!-- Tailwind CSS para design responsivo e ágil -->
    <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="../CSS/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@400;700;900&display=swap');

        /* Classes utilitárias tipográficas */
        .comic-font { 
            font-family: 'Luckiest Guy', cursive; 
            letter-spacing: 1px; 
        }
        .body-font {
            font-family: 'Quicksand', sans-serif;
        }

        /* Estilo da página de quadrinho inspirada na imagem image_0391d1.jpg */
        .folha-bd {
            background-color: #ffffff;
            border: 4px solid #000000;
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 1);
        }

        /* Contorno preto forte clássico de quadrinhos impressos */
        .comic-border {
            border: 4px solid #000000;
        }

        /* Animação CSS para o brilho suave das estrelas de fundo */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .star-active {
            animation: twinkle 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-[#0b0b14] text-black min-h-screen font-sans pb-16 body-font relative overflow-x-hidden">

    <!-- PLANO DE FUNDO: Estrelas Cósmicas Cintilantes -->
    <div id="stars-background" class="absolute inset-0 pointer-events-none z-0"></div>

    <!-- Cabeçalho Principal -->
    <header class="text-center py-8 px-4 z-10 relative">
        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-wider text-[#ffcc00] drop-shadow-[0_4px_0_rgba(0,0,0,1)] comic-font">
            O Resgate Estelar
        </h1>
        <p class="text-indigo-200 mt-2 font-black text-lg uppercase tracking-wide">Uma aventura interativa por Pâmela de Castro</p>
    </header>

    <a href="../webcomics.html" class="fixed top-4 right-4 z-[999] bg-white hover:bg-[var(--comic-red)] hover:text-white text-black border-4 border-black px-4 py-2 font-black text-xl brutal-shadow transition-all active:translate-y-1 flex items-center gap-2 no-underline uppercase tracking-widest">
        <i data-lucide="arrow-left" class="w-5 h-5"></i> VOLTAR
    </a>

    <!-- CONTAINER DA PÁGINA DO QUADRINHO (MIMIC DA IMAGEM image_0391d1.jpg) -->
    <main class="max-w-4xl mx-auto px-4 z-10 relative">
        
        <div id="folha-bd" class="folha-bd p-6 md:p-8 flex flex-col gap-6">
            
            <!-- FILERA SUPERIOR: PARTES 1, 2 E 3 (QUADROS VERTICAIS LIMPAS) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                
                <!-- Quadro 1 -->
                <div class="comic-border aspect-[3/4] overflow-hidden bg-slate-100 relative">
                    <!-- Substitua o src pela sua Ilustração 1 -->
                    <img src="../image/comic11/quadro1.png" 
                         class="w-full h-full object-cover">
                </div>

                <!-- Quadro 2 -->
                <div class="comic-border aspect-[3/4] overflow-hidden bg-slate-100 relative">
                    <!-- Substitua o src pela sua Ilustração 2 -->
                    <img src="../image/comic11/quadro2.png" 
                         class="w-full h-full object-cover">
                </div>

                <!-- Quadro 3 -->
                <div class="comic-border aspect-[3/4] overflow-hidden bg-slate-100 relative">
                    <!-- Substitua o src pela sua Ilustração 3 -->
                    <img src="../image/comic11/quadro3.png" 
                         class="w-full h-full object-cover">
                </div>

            </div>

            <!-- FILERA DO MEIO: MINIJOGO AMPLADO (HORIZONTAL E GIGANTE) -->
            <div id="area-minijogo" class="comic-border bg-[#11111d] p-4 flex flex-col justify-between min-h-[580px] relative text-white">
                
                <!-- Layout Ativo do Jogo (Canvas + Botões) -->
                <div id="jogo-ativo" class="h-full flex flex-col justify-between flex-grow">
                    
                    <!-- Cabeçalho de Identificação Cósmica -->
                    <div class="flex justify-end items-center mb-2">
                        <span class="bg-red-600 text-white font-bold px-2 py-0.5 text-[10px] rounded uppercase tracking-wider animate-pulse">Pêndulo Ativo</span>
                    </div>

                    <!-- Tela do Radar Cósmico Ampliada (Canvas) -->
                    <div class="flex-grow flex flex-col items-center justify-center">
                        <div class="relative w-full max-w-[800px] aspect-[2/1] max-h-[400px] bg-black border-4 border-black overflow-hidden shadow-inner">
                            <canvas id="canvas-garra" class="w-full h-full block"></canvas>
                        </div>
                    </div>

                    <!-- Controles Táteis / Interface de Comando -->
                    <div class="mt-4 flex flex-col items-center">
                        <div class="flex gap-4 w-full justify-center">
                            <button id="ctrl-esq" class="comic-border bg-indigo-700 hover:bg-indigo-600 px-6 py-2.5 rounded font-black text-xl active:translate-y-0.5 select-none text-white">
                                ◀
                            </button>
                            <button id="ctrl-pegar" class="comic-border bg-[#ff3366] hover:bg-rose-500 px-8 py-2.5 rounded font-black text-md uppercase active:translate-y-0.5 select-none text-white comic-font">
                                LANÇAR!
                            </button>
                            <button id="ctrl-dir" class="comic-border bg-indigo-700 hover:bg-indigo-600 px-6 py-2.5 rounded font-black text-xl active:translate-y-0.5 select-none text-white">
                                ▶
                            </button>
                        </div>
                        <p class="text-[10px] text-indigo-300 mt-2 text-center uppercase tracking-wider font-semibold">
                            Dica: Use <strong>◀ e ▶</strong> para mover o carrinho e <strong>Espaço</strong> para lançar a garra!
                        </p>
                    </div>

                </div>

                <!-- Quadro de Vitória (Substitui o jogo ao ganhar) -->
                  <!-- Quadro de Vitória (Substitui o jogo ao ganhar - Altura Reduzida pela Metade) -->
                <div id="jogo-vitoria-imagem" class="hidden h-[250px] min-h-[250px] w-full relative overflow-hidden">
                    <!-- Substitua o src pela sua Ilustração de Captura Vitoriosa -->
                    <img src="../image/comic11/quadro4.png" 
                         class="w-full h-full object-cover">
                </div>

            </div>

            <!-- FILERA INFERIOR: NARRATIVA EXPANDIDA (REVELADA SÓ APÓS A VITÓRIA) -->
            <div id="narrativa-expandida" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in duration-700">
                
                <!-- Quadro 5 (Esquerda - "ISSO!") -->
                <div class="comic-border aspect-[3/4] overflow-hidden bg-slate-100 relative">
                    <!-- Substitua o src pela sua Ilustração 5 -->
                    <img src="../image/comic11/quadro5.png" 
                         class="w-full h-full object-cover">
                </div>

                <!-- Quadro 6 (Direita - "Pão de Queijo Cósmico") -->
                <div class="comic-border aspect-[3/4] overflow-hidden bg-slate-100 relative">
                    <!-- Substitua o src pela sua Ilustração 6 -->
                    <img src="../image/comic11/quadro6.png" 
                         class="w-full h-full object-cover">
                </div>

            </div>

        </div>

    </main>

    <!-- LÓGICA E MOTOR GRÁFICO DO MINIJOGO -->
    <script>
        window.onload = function() {
            // --- GERADOR DE ESTRELAS DE FUNDO ---
            function gerarEstrelas() {
                const background = document.getElementById('stars-background');
                for (let i = 0; i < 75; i++) {
                    const star = document.createElement('div');
                    star.className = 'absolute bg-white rounded-full pointer-events-none star-active';
                    const size = Math.random() * 2 + 1;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.top = Math.random() * 100 + 'vh';
                    
                    const duration = Math.random() * 3 + 2; 
                    const delay = Math.random() * 5;
                    star.style.animationDuration = duration + 's';
                    star.style.animationDelay = delay + 's';
                    
                    if (Math.random() > 0.75) {
                        star.style.boxShadow = '0 0 5px #00ccff';
                    } else if (Math.random() > 0.88) {
                        star.style.boxShadow = '0 0 5px #ffcc00';
                    }
                    background.appendChild(star);
                }
            }
            gerarEstrelas();

            // --- INSTANCIAÇÃO DO CANVAS (TAMANHO AMPLIADO) ---
            const canvas = document.getElementById('canvas-garra');
            const ctx = canvas.getContext('2d');

            // Nova proporção widescreen gigante
            canvas.width = 800;
            canvas.height = 400;

            const JOGO_ESTADO = {
                IDLE: 'idle',           
                DESCENDO: 'descendo',   
                RECOLHENDO: 'recolhendo',
                SUCESSO: 'sucesso'      
            };

            let estadoAtual = JOGO_ESTADO.IDLE;
            let tempo = 0;              
            
            const feedbackMsg = {
                texto: "",
                cor: "",
                duracao: 0
            };

            const garra = {
                x: canvas.width / 2,     
                y: 35,                   
                velocidadeHorizontal: 6, // Levemente acelerado para o novo espaço
                velocidadeVertical: 7,   // Descida mais rápida para o cabo maior
                raioGarra: 18,
                comprimentoCabo: 50,     
                comprimentoMaximoCabo: canvas.height - 90,
                abertura: 18,            
                temObjeto: false,
                
                angulo: 0,               
                anguloLancado: 0,        
                velocidadeAngulo: 0.032, 
                amplitudeAngulo: 0.8     
            };

            const estrela = {
                x: canvas.width / 2,
                y: canvas.height - 50,
                raio: 20,
                pulso: 0,                
                cor: '#ffcc00',          
                
                baseX: canvas.width / 2,
                amplitudeMovimento: 320, // Amplitude expandida para ocupar a nova largura do canvas!
                velocidadeMovimento: 0.022 
            };

            const particulas = [];
            for (let i = 0; i < 40; i++) { // Mais poeira estelar para preencher a tela maior
                particulas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    raio: Math.random() * 2,
                    brilho: Math.random()
                });
            }

            const teclas = {
                ArrowLeft: false,
                ArrowRight: false
            };

            const btnEsq = document.getElementById('ctrl-esq');
            const btnDir = document.getElementById('ctrl-dir');
            const btnPegar = document.getElementById('ctrl-pegar');
            const jogoAtivoLayout = document.getElementById('jogo-ativo');
            const jogoVitoriaLayout = document.getElementById('jogo-vitoria-imagem');
            const narrativaExpandida = document.getElementById('narrativa-expandida');

            // --- LISTENERS DE INTERAÇÃO ---
            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft') teclas.ArrowLeft = true;
                if (e.code === 'ArrowRight') teclas.ArrowRight = true;
                if (e.code === 'Space') {
                    e.preventDefault(); 
                    lançarGarra();
                }
            });

            window.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft') teclas.ArrowLeft = false;
                if (e.code === 'ArrowRight') teclas.ArrowRight = false;
            });

            btnEsq.addEventListener('mousedown', () => teclas.ArrowLeft = true);
            btnEsq.addEventListener('mouseup', () => teclas.ArrowLeft = false);
            btnEsq.addEventListener('mouseleave', () => teclas.ArrowLeft = false);
            btnEsq.addEventListener('touchstart', (e) => { e.preventDefault(); teclas.ArrowLeft = true; });
            btnEsq.addEventListener('touchend', () => teclas.ArrowLeft = false);

            btnDir.addEventListener('mousedown', () => teclas.ArrowRight = true);
            btnDir.addEventListener('mouseup', () => teclas.ArrowRight = false);
            btnDir.addEventListener('mouseleave', () => teclas.ArrowRight = false);
            btnDir.addEventListener('touchstart', (e) => { e.preventDefault(); teclas.ArrowRight = true; });
            btnDir.addEventListener('touchend', () => teclas.ArrowRight = false);

            btnPegar.addEventListener('click', lançarGarra);

            function dispararMensagemFeedback(texto, color) {
                feedbackMsg.texto = texto;
                feedbackMsg.cor = color;
                feedbackMsg.duracao = 90; 
            }

            function lançarGarra() {
                if (estadoAtual === JOGO_ESTADO.IDLE) {
                    estadoAtual = JOGO_ESTADO.DESCENDO;
                    garra.anguloLancado = garra.angulo;
                }
            }

            function desenharEstrela(cx, cy, pontas, raioExterno, raioInterno, cor) {
                let rot = (Math.PI / 2) * 3;
                let x = cx;
                let y = cy;
                let passo = Math.PI / pontas;

                ctx.beginPath();
                ctx.moveTo(cx, cy - raioExterno);
                for (let i = 0; i < pontas; i++) {
                    x = cx + Math.cos(rot) * raioExterno;
                    y = cy + Math.sin(rot) * raioExterno;
                    ctx.lineTo(x, y);
                    rot += passo;

                    x = cx + Math.cos(rot) * raioInterno;
                    y = cy + Math.sin(rot) * raioInterno;
                    ctx.lineTo(x, y);
                    rot += passo;
                }
                ctx.lineTo(cx, cy - raioExterno);
                ctx.closePath();
                ctx.fillStyle = cor;
                ctx.fill();
                ctx.strokeStyle = '#ca8a04';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            // --- LÓGICA E CÁLCULOS FÍSICOS ---
            function atualizarFisica() {
                tempo += 1;
                estrela.pulso += 0.05;

                // 1. Movimento Cósmico Horizontal da Estrela
                if (!garra.temObjeto) {
                    estrela.x = estrela.baseX + Math.sin(tempo * estrela.velocidadeMovimento) * estrela.amplitudeMovimento;
                }

                // 2. Estado de Balanço do Pêndulo
                if (estadoAtual === JOGO_ESTADO.IDLE) {
                    garra.angulo = Math.sin(tempo * garra.velocidadeAngulo) * garra.amplitudeAngulo;

                    if (teclas.ArrowLeft && garra.x > 60) {
                        garra.x -= garra.velocidadeHorizontal;
                    }
                    if (teclas.ArrowRight && garra.x < canvas.width - 60) {
                        garra.x += garra.velocidadeHorizontal;
                    }
                    garra.abertura = 18; 
                }

                // 3. Descida Ativa do Cabo
                if (estadoAtual === JOGO_ESTADO.DESCENDO) {
                    garra.comprimentoCabo += garra.velocidadeVertical;
                    garra.abertura = 24; 

                    const garraX = garra.x + Math.sin(garra.anguloLancado) * garra.comprimentoCabo;
                    const garraY = garra.y + Math.cos(garra.anguloLancado) * garra.comprimentoCabo;

                    const dist = Math.hypot(garraX - estrela.x, garraY - estrela.y);
                    if (dist < (garra.raioGarra + estrela.raio)) {
                        garra.temObjeto = true;
                        estadoAtual = JOGO_ESTADO.RECOLHENDO;
                    }

                    if (garra.comprimentoCabo >= garra.comprimentoMaximoCabo || 
                        garraX < 15 || garraX > canvas.width - 15 || 
                        garraY >= canvas.height - 15) {
                        estadoAtual = JOGO_ESTADO.RECOLHENDO;
                    }
                }

                // 4. Recolha da Garra
                if (estadoAtual === JOGO_ESTADO.RECOLHENDO) {
                    garra.comprimentoCabo -= garra.velocidadeVertical;
                    garra.abertura = 10; 

                    const garraX = garra.x + Math.sin(garra.anguloLancado) * garra.comprimentoCabo;
                    const garraY = garra.y + Math.cos(garra.anguloLancado) * garra.comprimentoCabo;

                    if (garra.temObjeto) {
                        estrela.x = garraX;
                        estrela.y = garraY + 12;
                    }

                    if (garra.comprimentoCabo <= 45) {
                        garra.comprimentoCabo = 45;
                        
                        if (garra.temObjeto) {
                            estadoAtual = JOGO_ESTADO.SUCESSO;
                            finalizarJogada();
                        } else {
                            estadoAtual = JOGO_ESTADO.IDLE;
                        }
                    }
                }
            }

            function finalizarJogada() {
                // Oculta o minijogo e revela a narrativa expandida na folha
                jogoAtivoLayout.classList.add('hidden');
                jogoVitoriaLayout.classList.remove('hidden');
                
                // Reduz dinamicamente a altura mínima do painel para corresponder à nova altura reduzida pela metade
                const areaMinijogo = document.getElementById('area-minijogo');
                areaMinijogo.classList.remove('min-h-[580px]');
                areaMinijogo.classList.add('min-h-[300px]');
                
                narrativaExpandida.classList.remove('hidden');
            }

            // --- RENDERIZAÇÃO DA TELA DO HUD TÁTICO ---
            function renderizar() {
                // Fundo do radar tático claro e limpo
                ctx.fillStyle = '#f0f7ff'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 1. DESENHAR GRELHA TÁTICA (VECTOR GRID)
                ctx.strokeStyle = 'rgba(30, 41, 59, 0.08)';
                ctx.lineWidth = 1;
                for (let x = 0; x < canvas.width; x += 30) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += 30) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }

                // 2. DESENHAR ANÉIS DE SONAR / RADAR
                ctx.strokeStyle = 'rgba(30, 41, 59, 0.10)';
                ctx.lineWidth = 1.5;
                const radarCentroX = canvas.width / 2;
                const radarCentroY = garra.y;
                for (let r = 100; r <= 400; r += 100) {
                    ctx.beginPath(); ctx.arc(radarCentroX, radarCentroY, r, 0, Math.PI * 2); ctx.stroke();
                }

                // 3. MIRA ELETRÔNICA DO ALVO (TARGET LOCK BRACKETS)
                const noLançamento = (estadoAtual === JOGO_ESTADO.DESCENDO || estadoAtual === JOGO_ESTADO.RECOLHENDO);
                const bracketTamanho = estrela.raio + 8;
                ctx.lineWidth = 2.5;
                
                if (estadoAtual !== JOGO_ESTADO.SUCESSO) {
                    if (noLançamento) {
                        ctx.strokeStyle = (Math.floor(tempo / 15) % 2 === 0) ? '#ff3366' : 'rgba(255, 51, 102, 0.4)';
                    } else {
                        ctx.strokeStyle = 'rgba(5, 150, 105, 0.85)'; 
                    }

                    // Cantos da retícula eletrônica que persegue a estrela
                    // Superior Esquerdo
                    ctx.beginPath();
                    ctx.moveTo(estrela.x - bracketTamanho, estrela.y - bracketTamanho + 6);
                    ctx.lineTo(estrela.x - bracketTamanho, estrela.y - bracketTamanho);
                    ctx.lineTo(estrela.x - bracketTamanho + 6, estrela.y - bracketTamanho);
                    ctx.stroke();

                    // Superior Direito
                    ctx.beginPath();
                    ctx.moveTo(estrela.x + bracketTamanho, estrela.y - bracketTamanho + 6);
                    ctx.lineTo(estrela.x + bracketTamanho, estrela.y - bracketTamanho);
                    ctx.lineTo(estrela.x + bracketTamanho - 6, estrela.y - bracketTamanho);
                    ctx.stroke();

                    // Inferior Esquerdo
                    ctx.beginPath();
                    ctx.moveTo(estrela.x - bracketTamanho, estrela.y + bracketTamanho - 6);
                    ctx.lineTo(estrela.x - bracketTamanho, estrela.y + bracketTamanho);
                    ctx.lineTo(estrela.x - bracketTamanho + 6, estrela.y + bracketTamanho);
                    ctx.stroke();

                    // Inferior Direito
                    ctx.beginPath();
                    ctx.moveTo(estrela.x + bracketTamanho, estrela.y + bracketTamanho - 6);
                    ctx.lineTo(estrela.x + bracketTamanho, estrela.y + bracketTamanho);
                    ctx.lineTo(estrela.x + bracketTamanho - 6, estrela.y + bracketTamanho);
                    ctx.stroke();

                    // Mensagem de travamento no HUD
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.font = '9px monospace';
                    ctx.textAlign = 'left';
                    const labelLock = noLançamento ? 'ALVO ATIVO ' : 'ALVO DETECTADO';
                    ctx.fillText(`TRK: ${labelLock}`, estrela.x + bracketTamanho + 4, estrela.y - bracketTamanho + 8);
                }

                // Desenhar Estrela Cósmica
                const pulsoRaio = estrela.raio + Math.sin(estrela.pulso) * 1.5;
                if (estadoAtual !== JOGO_ESTADO.SUCESSO) {
                    ctx.fillStyle = 'rgba(250, 204, 21, 0.15)';
                    ctx.beginPath();
                    ctx.arc(estrela.x, estrela.y, pulsoRaio * 1.6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    desenharEstrela(estrela.x, estrela.y, 5, pulsoRaio, pulsoRaio / 2, estrela.cor);
                }

                // Determinar ângulo de inclinação do cabo
                const anguloAtivo = (estadoAtual === JOGO_ESTADO.IDLE) ? garra.angulo : garra.anguloLancado;

                // Extremidade real da garra
                const xFim = garra.x + Math.sin(anguloAtivo) * garra.comprimentoCabo;
                const yFim = garra.y + Math.cos(anguloAtivo) * garra.comprimentoCabo;

                // Desenhar Trilho de Força superior
                ctx.strokeStyle = '#3b82f6'; 
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(10, garra.y - 3);
                ctx.lineTo(canvas.width - 10, garra.y - 3);
                ctx.stroke();

                // Desenhar Carrinho deslizante
                ctx.fillStyle = '#1e293b';
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.roundRect(garra.x - 25, garra.y - 12, 50, 18, 4);
                ctx.fill();
                ctx.stroke();

                // Cabo do Pêndulo (Estilo Laser)
                ctx.strokeStyle = noLançamento ? '#ff3366' : '#1d4ed8'; 
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(garra.x, garra.y + 4);
                ctx.lineTo(xFim, yFim);
                ctx.stroke();

                // Base Articulada da Garra
                ctx.fillStyle = '#334155';
                ctx.strokeStyle = '#1d4ed8';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(xFim, yFim, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Pinça Esquerda
                ctx.beginPath();
                ctx.arc(xFim - 5, yFim + 3, 12, Math.PI, Math.PI * 0.5, true);
                ctx.lineTo(xFim - garra.abertura, yFim + 22);
                ctx.strokeStyle = '#1d4ed8';
                ctx.lineWidth = 3.5;
                ctx.stroke();

                // Pinça Direita
                ctx.beginPath();
                ctx.arc(xFim + 5, yFim + 3, 12, 0, Math.PI * 0.5, false);
                ctx.lineTo(xFim + garra.abertura, yFim + 22);
                ctx.stroke();

                // 4. HUD TELEMETRIA EM REAL-TIME (Telas de Navegação)
                ctx.fillStyle = 'rgba(15, 23, 42, 0.85)'; 
                ctx.font = '10px monospace';
                ctx.textAlign = 'left';

                const statusHUD = (estadoAtual === JOGO_ESTADO.IDLE) ? 'PREPARADO' : estadoAtual.toUpperCase();
                ctx.fillText(`STATUS_DO_SISTEMA: ${statusHUD}`, 20, 25);
                
                const rangeMts = Math.round(Math.hypot(xFim - estrela.x, yFim - estrela.y));
                ctx.fillText(`ALCANCE: ${rangeMts}m`, 20, 40);

                const grausHUD = Math.round(anguloAtivo * (180 / Math.PI));
                ctx.fillText(`ÂNGULO: ${grausHUD}°`, 20, 55);

                ctx.textAlign = 'right';
                ctx.fillText(`COORDENADA_X: ${Math.round(xFim)}`, canvas.width - 20, 25);
                ctx.fillText(`COORDENADA_Y: ${Math.round(yFim)}`, canvas.width - 20, 40);

                // Exibição de mensagens temporárias e feedbacks
                if (feedbackMsg.duracao > 0) {
                    ctx.fillStyle = feedbackMsg.cor;
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = '#ffffff'; 
                    ctx.lineWidth = 3.5;
                    ctx.strokeText(feedbackMsg.texto, canvas.width / 2, 90);
                    ctx.fillText(feedbackMsg.texto, canvas.width / 2, 90);
                    feedbackMsg.duracao--;
                }
            }

            // --- MOTOR DE CICLO GRÁFICO (GAME LOOP) ---
            function gameLoop() {
                atualizarFisica();
                renderizar();
                requestAnimationFrame(gameLoop);
            }

            gameLoop();
        };
    </script>
</body>
