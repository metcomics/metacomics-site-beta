<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcomic Interativa: Passagem do Tempo | Metacomics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --comic-red: #ff3366;
            --comic-blue: #00ccff;
            --comic-yellow: #ffcc00;
            --comic-black: #111111;
            --comic-white: #fdfdfd;
        }

        body { font-family: 'Quicksand', sans-serif; background-color: #f4f4f5; transition: background-color 0.8s ease; }
        .font-bangers { font-family: 'Luckiest Guy', cursive; }

        #emBreve #voltar #fim {
            font-family: "Lukiest Guy";
        }

        /* Estilos Neo-Brutalistas */
        .brutal-border { border: 4px solid var(--comic-black); }
        .brutal-shadow { box-shadow: 8px 8px 0 var(--comic-black); transition: all 0.2s ease; }
        .brutal-shadow:active { box-shadow: 2px 2px 0 var(--comic-black); transform: translate(6px, 6px); }
        
        .bg-pattern-overlay {
            background-image: radial-gradient(var(--comic-black) 1px, transparent 1px);
            background-size: 10px 10px;
            opacity: 0.05;
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
        }

        /* Filtro de cor por cima das imagens para ajudar no clima */
        .img-container { position: relative; overflow: hidden; }
        .img-container img { transition: opacity 0.5s facil; }
        .filtro-luz { 
            position: absolute; inset: 0; pointer-events: none; 
            mix-blend-mode: multiply; opacity: 0; transition: opacity 0.8s ease, background-color 0.8s ease;
        }

        /* Classes ativas para os botões */
        .btn-ativo { background-color: var(--comic-black) !important; color: white !important; }
    </style>
        
</head>
<body id="body-pagina" class="p-4 md:p-10 flex flex-col items-center min-h-screen relative z-10 transition-colors duration-700">

    <a href="../webcomics.html" class="fixed top-4 right-4 z-[999] bg-white hover:bg-[var(--comic-red)] hover:text-white text-black border-4 border-black px-4 py-2 font-bangers text-xl brutal-shadow transition-all active:translate-y-1 flex items-center gap-2 no-underline">
    <i data-lucide="arrow-left" class="w-5 h-5"></i> VOLTAR
    </a>

    <div class="bg-pattern-overlay"></div>

    <header class="mb-8 text-center max-w-3xl w-full">
        <h1 class="text-5xl md:text-6xl font-bangers text-[var(--comic-white)] drop-shadow-[3px_3px_0_var(--comic-black)] mb-6" style="-webkit-text-stroke: 1px #111;">O RELÓGIO DA CIDADE</h1>
        
        <div class="flex justify-center gap-4 bg-white p-3 brutal-border brutal-shadow mb-4">
            <button onclick="mudarTempo('dia')" id="btn-dia" class="flex-1 py-2 font-bangers text-2xl bg-[var(--comic-blue)] border-2 border-black hover:bg-black hover:text-white transition-colors btn-ativo">
                <i data-lucide="sun" class="inline-block w-6 h-6 mb-1"></i> DIA
            </button>
            <button onclick="mudarTempo('tarde')" id="btn-tarde" class="flex-1 py-2 font-bangers text-2xl bg-[var(--comic-yellow)] border-2 border-black hover:bg-black hover:text-white transition-colors">
                <i data-lucide="sunset" class="inline-block w-6 h-6 mb-1"></i> TARDE
            </button>
            <button onclick="mudarTempo('noite')" id="btn-noite" class="flex-1 py-2 font-bangers text-2xl bg-[#4a00e0] text-white border-2 border-black hover:bg-black transition-colors">
                <i data-lucide="moon" class="inline-block w-6 h-6 mb-1"></i> NOITE
            </button>
        </div>
        <p id="texto-narrador" class="text-xl font-bold bg-white px-4 py-2 brutal-border inline-block transform rotate-1">A manhã está tranquila na rua principal...</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-white p-2 brutal-border brutal-shadow flex flex-col img-container">
            <img id="quadro-1" src="../image/img1.jpg" class="w-full h-80 object-cover border-2 border-black" alt="Cena 1">
            <div class="filtro-luz"></div>
        </div>

        <div class="bg-white p-2 brutal-border brutal-shadow flex flex-col img-container">
            <img id="quadro-2" src="../image/img1.jpg" class="w-full h-80 object-cover border-2 border-black" alt="Cena 2">
            <div class="filtro-luz"></div>
        </div>

        <div class="bg-white p-2 brutal-border brutal-shadow flex flex-col img-container">
            <img id="quadro-3" src="../image/img1.jpg" class="w-full h-80 object-cover border-2 border-black" alt="Cena 3">
            <div class="filtro-luz"></div>
        </div>

    </main>

    <script>
        lucide.createIcons();

        // 1. O CATÁLOGO DE IMAGENS E DADOS
        // Aqui você coloca os caminhos das suas artes (ex: 'image/rua_tarde.jpg')
        const dadosTempo = {
            dia: {
                imagens: [
                    "../image/img1.jpg",
                    "../image/img1.jpg",
                    "../image/img1.jpg"
                ],
                texto: "A manhã está tranquila na rua principal...",
                corFundo: "#f4f4f5", // Cinza claro padrão
                corFiltro: "transparent",
                opacidadeFiltro: "0"
            },
            tarde: {
                imagens: [
                    "../image/img2.jpg",
                    "../image/img2.jpg",
                    "../image/img2.jpg"
                ],
                texto: "O sol começa a se pôr. As sombras alongam-se...",
                corFundo: "#ffebd6", // Tom alaranjado suave
                corFiltro: "#ff9900", // Laranja
                opacidadeFiltro: "0.3"
            },
            noite: {
                imagens: [
                    "../image/img3.jpg",
                    "../image/img3.jpg",
                    "../image/img3.jpg"
                ],
                texto: "A escuridão toma conta. Apenas as luzes de neon brilham.",
                corFundo: "#1a1a2e", // Azul noturno escuro
                corFiltro: "#000033", // Azul escuro
                opacidadeFiltro: "0.6"
            }
        };

        // 2. A FUNÇÃO MÁGICA QUE MUDA TUDO
        function mudarTempo(tempo) {
            const dados = dadosTempo[tempo];

            // A) Troca as imagens dos 3 quadros
            document.getElementById('quadro-1').src = dados.imagens[0];
            document.getElementById('quadro-2').src = dados.imagens[1];
            document.getElementById('quadro-3').src = dados.imagens[2];

            // B) Troca o texto do narrador
            document.getElementById('texto-narrador').innerText = dados.texto;

            // C) Muda a cor de fundo da página para a imersão
            document.getElementById('body-pagina').style.backgroundColor = dados.corFundo;

            // D) Aplica o filtro de iluminação sobre as imagens
            const filtros = document.querySelectorAll('.filtro-luz');
            filtros.forEach(filtro => {
                filtro.style.backgroundColor = dados.corFiltro;
                filtro.style.opacity = dados.opacidadeFiltro;
            });

            // E) Atualiza o visual dos botões (mostra qual está ativo)
            document.getElementById('btn-dia').classList.remove('btn-ativo');
            document.getElementById('btn-tarde').classList.remove('btn-ativo');
            document.getElementById('btn-noite').classList.remove('btn-ativo');
            
            document.getElementById(`btn-${tempo}`).classList.add('btn-ativo');
        }
    </script>
</body>
</html>
