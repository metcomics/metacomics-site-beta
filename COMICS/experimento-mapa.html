<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcomic Interativa: Exploração | Metacomics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================
           O MAPA E A CÂMERA
           ========================================= */
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            cursor: grab;
            position: relative;
        }
        
        #viewport:active {
            cursor: grabbing;
        }

        #viewport::-webkit-scrollbar { display: none; }
        #viewport { -ms-overflow-style: none; scrollbar-width: none; }

        /* A imagem gigante do mapa (proporção mais retangular baseada na imagem) */
        #mapa-container {
            position: relative;
            width: 3000px; 
            height: 1000px;
            background-image: url('../image/comic7/background.png');/* Descomente para usar sua imagem */
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* =========================================
           HOTSPOTS (PONTOS DE INTERESSE - BOLINHAS PRETAS)
           ========================================= */
        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%); /* Centraliza exato na coordenada */
            z-index: 10;
        }

        @keyframes pulso-alerta {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.774); }
            70% { box-shadow: 0 0 0 20px rgba(0, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .animar-pulso {
            animation: pulso-alerta 2s infinite;
        }

        /* =========================================
           PAINÉIS DE QUADRINHOS (QUADROS LARANJAS)
           ========================================= */
        .comic-panel {
            position: absolute;
            z-index: 20; 
            transition: opacity 0.3s ease, transform 0.3s ease;
            /* Centraliza o painel exatamente na mesma coordenada do botão */
            transform-origin: center;
        }
        
        /* Efeito de entrada ajustado para manter a centralização */
        .panel-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -45%) scale(0.90);
        }
        
        .panel-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body class="bg-black">

    <a href="../webcomics.html" class="fixed top-4 right-4 z-[999] bg-white hover:bg-[var(--comic-red)] hover:text-white text-black border-4 border-black px-4 py-2 font-bangers text-xl shadow-[4px_4px_0_0_rgba(0,0,0,1)] transition-all active:translate-y-1 flex items-center gap-2 no-underline">
        <i data-lucide="arrow-left" class="w-5 h-5"></i> VOLTAR
    </a>


    <div id="viewport">
        <div id="mapa-container">
            
            <button class="hotspot animar-pulso w-10 h-10 rounded-full cursor-pointer" 
                    style="top: 80%; left: 13%;" 
                    onclick="abrirPainel('quadro-1')">
            </button>
            <div id="quadro-1" class="comic-panel panel-hidden  w-[635px] h-[600px] flex flex-col justify-center items-center p-6" 
                 style="top: 70%; left: 14%;">
                <button onclick="fecharPainel('quadro-1')" class="absolute -top-0 -right-0 bg-black text-white w-14 h-14 rounded-full border-4 border-black flex items-center justify-center font-bold hover:bg-white hover:text-black z-40 transition-colors">X</button>
                <img src="../image/comic7/quadro1.png" alt="quadro 01">
            </div>

            <button class="hotspot animar-pulso w-8 h-8 rounded-full cursor-pointer" 
                    style="top: 20%; left: 23%;" 
                    onclick="abrirPainel('quadro-2')">
            </button>
            <div id="quadro-2" class="comic-panel panel-hidden w-[250px] h-[230px] flex flex-col justify-center items-center p-4" 
                 style="top: 20%; left: 23%;">
                <button onclick="fecharPainel('quadro-2')" class="absolute -top-0 -right-0 bg-black text-white w-14 h-14 rounded-full border-4 border-black flex items-center justify-center font-bold hover:bg-white hover:text-black z-40 transition-colors">X</button>
                <img src="../image/comic7/quadro2.png" alt="quadro 01">
            </div>

            <button class="hotspot animar-pulso w-12 h-12 rounded-full cursor-pointer" 
                    style="top: 70%; left: 31%;" 
                    onclick="abrirPainel('quadro-3')">
            </button>
            <div id="quadro-3" class="comic-panel panel-hidden w-[600px] h-[600px] flex flex-col justify-center items-center p-6" 
                 style="top: 67%; left: 36%;">
                <button onclick="fecharPainel('quadro-3')" class="absolute -top-0 -right-0 bg-black text-white w-14 h-14 rounded-full border-4 border-black flex items-center justify-center font-bold hover:bg-white hover:text-black z-40 transition-colors">X</button>
                <img src="../image/comic7/quadro3.png" alt="quadro 01">
            </div>

            <button class="hotspot animar-pulso w-10 h-10 rounded-full cursor-pointer" 
                    style="top: 30%; left: 53%;" 
                    onclick="abrirPainel('quadro-4')">
            </button>
            <div id="quadro-4" class="comic-panel panel-hidden w-[220px] h-[200px] flex flex-col justify-center items-center p-4" 
                 style="top: 30%; left: 53%;">
                <button onclick="fecharPainel('quadro-4')" class="absolute -top-0 -right-0 bg-black text-white w-14 h-14 rounded-full border-4 border-black flex items-center justify-center font-bold hover:bg-white hover:text-black z-40 transition-colors">X</button>
                <img src="../image/comic7/quadro4.png" alt="quadro 01">
            </div>

            <button class="hotspot animar-pulso w-8 h-8 rounded-full cursor-pointer" 
                    style="top: 90%; left: 61%;" 
                    onclick="abrirPainel('quadro-5')">
            </button>
            <div id="quadro-5" class="comic-panel panel-hidden w-[250px] h-[250px] flex flex-col justify-center items-center p-4" 
                 style="top: 85%; left: 61%;">
                <button onclick="fecharPainel('quadro-5')" class="absolute -top-0 -right-0 bg-black text-white w-14 h-14 rounded-full border-4 border-black flex items-center justify-center font-bold hover:bg-white hover:text-black z-40 transition-colors">X</button>
                <img src="../image/comic7/quadro5.png" alt="quadro 01">
            </div>

            <button class="hotspot animar-pulso w-12 h-12 rounded-full cursor-pointer" 
                    style="top: 70%; left: 91%;" 
                    onclick="abrirPainel('quadro-6')">
            </button>
            <div id="quadro-6" class="comic-panel panel-hidden w-[550px] h-[500px] flex flex-col justify-center items-center p-6" 
                 style="top: 71%; left: 91%;">
                <button onclick="fecharPainel('quadro-6')" class="absolute -top-0 -right-0 bg-black text-white w-14 h-14 rounded-full border-4 border-black flex items-center justify-center font-bold hover:bg-white hover:text-black z-40 transition-colors">X</button>
                <img src="../image/comic7/quadro6.png" alt="quadro 01">
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // LÓGICA DE ARRASTAR PARA NAVEGAR
        const viewport = document.getElementById('viewport');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.comic-panel')) return;
            
            isDragging = true;
            startX = e.pageX - viewport.offsetLeft;
            startY = e.pageY - viewport.offsetTop;
            scrollLeft = viewport.scrollLeft;
            scrollTop = viewport.scrollTop;
        });

        viewport.addEventListener('mouseleave', () => isDragging = false);
        viewport.addEventListener('mouseup', () => isDragging = false);

        viewport.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - viewport.offsetLeft;
            const y = e.pageY - viewport.offsetTop;
            const walkX = (x - startX) * 1.5; 
            const walkY = (y - startY) * 1.5;
            
            viewport.scrollLeft = scrollLeft - walkX;
            viewport.scrollTop = scrollTop - walkY;
        });

        window.onload = () => {
            viewport.scrollLeft = 0; // Inicia na ponta esquerda
            viewport.scrollTop = (viewport.scrollHeight - viewport.clientHeight) / 2;
        };

        // LÓGICA DOS PAINÉIS
        let paineisAbertosZIndex = 20;

        function abrirPainel(idPainel) {
            const painel = document.getElementById(idPainel);
            paineisAbertosZIndex++;
            painel.style.zIndex = paineisAbertosZIndex;

            painel.classList.remove('panel-hidden');
            painel.classList.add('panel-visible');
        }

        function fecharPainel(idPainel) {
            const painel = document.getElementById(idPainel);
            painel.classList.remove('panel-visible');
            painel.classList.add('panel-hidden');
        }
    </script>
</body>
</html>
