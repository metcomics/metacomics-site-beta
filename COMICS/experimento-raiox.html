<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcomic Interativa | Layout Misto Metacomics</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --comic-yellow: #FDE047;
            --comic-blue: #3B82F6;
            --comic-red: #EF4444;
            --comic-black: #111111;
            --comic-orange: #E87A3E; 
            --comic-purple: #8B85C1; 
            --comic-white: #FFFFFF; /* Garantindo que a cor branca exista caso não esteja no style.css externo */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f0;
            background-image: radial-gradient(#d1d1cc 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .font-bangers { font-family: 'Bangers', cursive; }
        
        .brutal-border { border: 4px solid var(--comic-black); }
        .brutal-shadow { box-shadow: 8px 8px 0px var(--comic-black); }
        .brutal-shadow-sm { box-shadow: 4px 4px 0px var(--comic-black); }

        .bg-pattern-overlay {
            position: fixed; /* Mantém o fundo fixo enquanto rola a página */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Coloca atrás de todo o conteúdo (seu conteúdo é z-10) */
            background-image: url('../image/comic9/background-comics.png');/* Substitua pelo caminho correto da sua imagem */ 
            background-repeat: repeat; /* Faz a imagem se repetir */
            background-position: center;
            opacity: 0.8; /* Opcional: ajusta a opacidade para não brigar com o conteúdo */
        }
        
        /* =========================================
           A MÁGICA DA LENTE (CLIP-PATH)
           ========================================= */
        #camada-secreta {
            opacity: 0;
            transition: opacity 0.3s ease; 
        }

        /* A imagem das mãos seguindo o mouse */
        #anel-lupa {
            position: absolute;
            pointer-events: none;
            
            /* Substitua 'image_975dd9.png' pelo caminho correto se a imagem estiver em outra pasta */
            background-image: url('../image/comic9/mãos.png'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Sombra brutalista que acompanha o formato irregular da imagem (mão) */
            filter: drop-shadow(8px 8px 0px var(--comic-black));
            
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: translate(-50%, -50%);
            z-index: 30;
        }

        /* Efeito de hover nos quadros estáticos para dar vida */
        .quadro-estatico img {
            transition: transform 0.3s ease;
        }
        .quadro-estatico:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen relative z-10">
    
    <a href="../webcomics.html" class="fixed top-4 right-4 z-[999] bg-white hover:bg-[var(--comic-red)] hover:text-white text-black border-4 border-black px-4 py-2 text-xl brutal-shadow transition-all active:translate-y-1 flex items-center gap-2 no-underline">
    <i data-lucide="arrow-left" class="w-5 h-5"></i> VOLTAR
    </a>

    <div class="bg-pattern-overlay"></div>

    <header class="mb-8 text-center max-w-3xl w-full mt-12 md:mt-0">
        <h1 class="text-4xl md:text-6xl text-[var(--comic-white)] drop-shadow-[3px_3px_0_var(--comic-black)] mb-4" style="-webkit-text-stroke: 1px #111;">Guardado na Memória</h1>
        <p class="text-lg md:text-xl font-bold bg-white px-4 py-2 brutal-border inline-block transform rotate-1">Roteiro, Desenho e Programação por Pâmela de Castro</p>
    </header>

    <!-- CONTAINER PRINCIPAL DOS QUADRINHOS -->
    <main class="w-full max-w-4xl relative z-10 pb-20">
        
        <!-- O GRANDE QUADRO DE FUNDO -->
        <div class="relative w-full brutal-border brutal-shadow bg-[var(--comic-white)] flex flex-col md:min-h-[1000px]">
            
            <!-- CONTEÚDO SUPERIOR -->
            <div class="relative z-10 w-full flex flex-col gap-2 md:gap-12 pt-4 md:pt-12 px-2 md:px-4 flex-grow pb-2 md:pb-0">
                
                <!-- LINHA 1: Os 3 Quadros Estáticos (Topo) -->
                <!-- MUDANÇA: Removida a classe 'brutal-border' dos 3 quadros -->
                <div class="grid grid-cols-3 gap-2 md:gap-6 w-full max-w-3xl mx-auto h-28 sm:h-48 md:h-64">
                    <div class="quadro-estatico overflow-hidden relative">
                        <img src="../image/comic9/quadro1.png" class="absolute inset-0 w-full h-full object-cover" alt="Quadro 1">
                    </div>
                    <div class="quadro-estatico overflow-hidden relative">
                        <img src="../image/comic9/quadro2.png" class="absolute inset-0 w-full h-full object-cover" alt="Quadro 2">
                    </div>
                    <div class="quadro-estatico overflow-hidden relative">
                        <img src="../image/comic9/quadro3.png" class="absolute inset-0 w-full h-full object-cover" alt="Quadro 3">
                    </div>
                </div>

                <!-- LINHA 2: O Quadro Interativo -->
                <div class="relative w-full">
                    <div id="quadro-interativo" class="relative w-full h-56 md:h-[300px] overflow-hidden cursor-none group flex items-center justify-center">
                        
                        <img src="../image/comic9/quadro4-1.png" 
                             class="absolute inset-0 w-full h-full object-contain z-10 pointer-events-none rounded-3xl" 
                             alt="Cena Normal">

                        <img id="camada-secreta" 
                             src="../image/comic9/quadro4-2.png" 
                             class="absolute inset-0 w-full h-full object-contain z-20 pointer-events-none" 
                             alt="Cena Secreta">

                        <div id="anel-lupa"></div>

                    </div>
                </div>
            </div>

            <!-- LINHA EXTRA: Quadro 5 Estático -->
            <!-- MUDANÇA: Removidas as classes 'border-t-4' e 'border-[var(--comic-black)]' -->
            <div class="quadro-estatico w-full h-64 md:h-[500px] overflow-hidden relative">
                <img src="../image/comic9/quadro5.png" class="absolute inset-0 w-full h-full object-cover" alt="Novo Quadro Final">
            </div>

        </div>

    </main>

<script>
        lucide.createIcons();

        const quadro = document.getElementById('quadro-interativo');
        const camadaSecreta = document.getElementById('camada-secreta');
        const anelLupa = document.getElementById('anel-lupa');

        // =========================================================================
        // CALIBRANDO A IMAGEM E O "BURACO" TRANSPARENTE
        // =========================================================================
        
        // 1. Tamanho total da imagem das mãos na tela
        const tamanhoMao = 300; 
        anelLupa.style.width = `${tamanhoMao}px`;
        anelLupa.style.height = `${tamanhoMao}px`;

        // 2. Tamanho do recorte que vai revelar a imagem por trás
        const buracoMetadeLargura = 94; 
        const buracoMetadeAltura = 50; 

        // 3. Ajuste fino de posição do buraco em relação ao centro do mouse
        const offsetX = -10; 
        const offsetY = 15;  

        // =========================================================================

        function atualizarLupa(e) {
            const rect = quadro.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            // Posição base do mouse
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            // Posição corrigida do centro do buraco
            const centroX = x + offsetX;
            const centroY = y + offsetY;

            // O clip-path usa o centro corrigido e recorta o retângulo
            camadaSecreta.style.clipPath = `polygon(
                ${centroX - buracoMetadeLargura}px ${centroY - buracoMetadeAltura}px, 
                ${centroX + buracoMetadeLargura}px ${centroY - buracoMetadeAltura}px, 
                ${centroX + buracoMetadeLargura}px ${centroY + buracoMetadeAltura}px, 
                ${centroX - buracoMetadeLargura}px ${centroY + buracoMetadeAltura}px
            )`;
            
            // A imagem das mãos acompanha o mouse
            anelLupa.style.left = `${x}px`;
            anelLupa.style.top = `${y}px`;
        }

        // Eventos para Desktop (Mouse)
        quadro.addEventListener('mousemove', atualizarLupa);
        quadro.addEventListener('mouseenter', () => { 
            anelLupa.style.opacity = '1'; 
            camadaSecreta.style.opacity = '1'; 
        });
        quadro.addEventListener('mouseleave', () => {
            anelLupa.style.opacity = '0';
            camadaSecreta.style.opacity = '0'; 
        });

        // Eventos para Mobile (Toque)
        quadro.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            atualizarLupa(e);
        });
        quadro.addEventListener('touchstart', (e) => {
            anelLupa.style.opacity = '1'; 
            camadaSecreta.style.opacity = '1';
            atualizarLupa(e);
        });
        quadro.addEventListener('touchend', () => {
            anelLupa.style.opacity = '0';
            camadaSecreta.style.opacity = '0';
        });
    </script>

</body>
</html>
