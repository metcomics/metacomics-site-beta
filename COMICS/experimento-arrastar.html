<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcomic Interativa: Monte sua História | Metacomics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        :root {
            --comic-yellow: #F2DA63;
            --comic-red: #d62552;
            --comic-blue: #41BDD9;
            --comic-black: #111111;
            --comic-white: #fdfdfd;
        }

    
        /* Classes específicas para o efeito de arrastar */
        .quadro-arrastavel {
            cursor: grab; /* Cursor de "mãozinha aberta" */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .quadro-arrastavel:active {
            cursor: grabbing; /* Cursor de "mãozinha fechada" ao segurar */
        }

        /* Efeito quando o quadro está sendo segurado no ar */
        .sendo-arrastado {
            opacity: 0.4;
            transform: scale(0.95);
        }

        /* Efeito no quadro que está "embaixo" esperando o outro cair por cima */
        .alvo-drop {
            border-color: var(--comic-red) !important;
            transform: scale(1.05);
            z-index: 50;
        }

        .bg-pattern-overlay {
    position: fixed; /* Mantém o fundo fixo enquanto rola a página */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; /* Coloca atrás de todo o conteúdo (seu conteúdo é z-10) */
    background-image: url('../image/comic4/estrelas.png');/* Substitua pelo caminho correto da sua imagem */ 
    background-repeat: repeat; /* Faz a imagem se repetir */
    background-position: center;
    opacity: 0.9; /* Opcional: ajusta a opacidade para não brigar com o conteúdo */
}

    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen relative z-10">
    
    <a href="../webcomics.html" class="fixed top-4 right-4 z-[999] bg-white hover:bg-[var(--comic-red)] hover:text-white text-black border-4 border-black px-4 py-2 font-bangers text-xl brutal-shadow transition-all active:translate-y-1 flex items-center gap-2 no-underline">
    <i data-lucide="arrow-left" class="w-5 h-5"></i> VOLTAR
    </a>

    <div class="bg-pattern-overlay"></div>

    <header class="mb-8 text-center max-w-3xl w-full">
        <h1 class="text-5xl md:text-6xl font-bangers text-[var(--comic-white)] drop-shadow-[3px_3px_0_var(--comic-black)] mb-4" style="-webkit-text-stroke: 1px #000000;">O QUEBRA-CABEÇA NARRATIVO</h1>
        <p class="text-xl font-bold bg-white px-4 py-2 brutal-border inline-block transform rotate-1">Clique, segure e arraste os quadros para mudar a ordem dos acontecimentos!</p>
    </header>

    <main id="grid-quadrinhos" class="w-full max-w-5xl grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 bg-white p-6 brutal-border brutal-shadow mb-8">
        
        <div class="quadro-arrastavel brutal-border bg-black relative" draggable="true">
            <img src="../image/comic6/Q6.png" class="w-full h-auto aspect-square object-cover pointer-events-none" alt="Cena A">
        </div>

        <div class="quadro-arrastavel brutal-border bg-black relative" draggable="true">
            <img src="../image/comic6/Q4.png" class="w-full h-auto aspect-square object-cover pointer-events-none" alt="Cena B">
        </div>

        <div class="quadro-arrastavel brutal-border bg-black relative" draggable="true">
            <img src="../image/comic6/Q2.png" class="w-full h-auto aspect-square object-cover pointer-events-none" alt="Cena C">
        </div>

        <div class="quadro-arrastavel brutal-border bg-black relative" draggable="true">
            <img src="../image/comic6/Q1.png" class="w-full h-auto aspect-square object-cover pointer-events-none" alt="Cena D">
        </div>

        <div class="quadro-arrastavel brutal-border bg-black relative" draggable="true">
            <img src="../image/comic6/Q5.png" class="w-full h-auto aspect-square object-cover pointer-events-none" alt="Cena E">
        </div>

        <div class="quadro-arrastavel brutal-border bg-black relative" draggable="true">
            <img src="../image/comic6/Q3.png" class="w-full h-auto aspect-square object-cover pointer-events-none" alt="Cena F">
        </div>

    </main>

    <script>
        lucide.createIcons();

        const quadros = document.querySelectorAll('.quadro-arrastavel');
        let quadroArrastado = null;

        // Adiciona os ouvintes de eventos para cada quadro
        quadros.forEach(quadro => {
            
            // 1. Quando o usuário clica e começa a arrastar
            quadro.addEventListener('dragstart', function(e) {
                quadroArrastado = this;
                // O setTimeout é um truque para que o elemento fique transparente apenas no lugar de origem, 
                // mas a "fantasma" que segue o mouse continue visível
                setTimeout(() => this.classList.add('sendo-arrastado'), 0);
            });

            // 2. Quando o usuário solta o botão do mouse (termina de arrastar)
            quadro.addEventListener('dragend', function() {
                this.classList.remove('sendo-arrastado');
                quadroArrastado = null;
                
                // Limpa os efeitos de "alvo" de todos os quadros, caso algum tenha ficado preso
                quadros.forEach(q => q.classList.remove('alvo-drop'));
            });

            // 3. Quando um quadro arrastado passa por cima deste quadro
            quadro.addEventListener('dragover', function(e) {
                e.preventDefault(); // OBRIGATÓRIO para permitir que o quadro seja solto aqui!
            });

            // 4. Quando o quadro arrastado ENTRA na área deste quadro
            quadro.addEventListener('dragenter', function(e) {
                e.preventDefault();
                if (this !== quadroArrastado) {
                    this.classList.add('alvo-drop'); // Pinta a borda de vermelho
                }
            });

            // 5. Quando o quadro arrastado SAI da área deste quadro
            quadro.addEventListener('dragleave', function() {
                this.classList.remove('alvo-drop'); // Tira a borda vermelha
            });

            // 6. O GRANDE FINAL: Quando o usuário SOLTA o quadro aqui em cima
            quadro.addEventListener('drop', function() {
                this.classList.remove('alvo-drop');
                
                // Se eu soltei um quadro em cima de OUTRO quadro (e não no mesmo lugar)
                if (quadroArrastado !== this) {
                    trocarElementosDOM(quadroArrastado, this);
                }
            });
        });

        // Função mágica que troca dois elementos de lugar na estrutura do HTML (DOM)
        function trocarElementosDOM(elemento1, elemento2) {
            // Guarda quem são os "irmãos" dos elementos para saber a posição exata de cada um
            const pai = elemento1.parentNode;
            const irmao1 = elemento1.nextSibling === elemento2 ? elemento1 : elemento1.nextSibling;
            const irmao2 = elemento2.nextSibling === elemento1 ? elemento2 : elemento2.nextSibling;
            
            // Move os elementos para as suas novas posições
            pai.insertBefore(elemento1, irmao2);
            pai.insertBefore(elemento2, irmao1);
        }
    </script>
</body>
</html>
